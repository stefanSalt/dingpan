name: build-windows

# 触发：
#  - push 到 main：构建并上传 exe 产物（artifact，可直接下载试用）
#  - push v* 标签：额外创建 GitHub Release 并附上 exe
#  - 手动触发
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # 打 tag 时创建 Release 需要写权限

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: PyInstaller 打包
        run: pyinstaller --noconfirm dingpan.spec

      - name: 上传 exe 产物
        uses: actions/upload-artifact@v4
        with:
          name: dingpan-windows-exe
          path: dist/*.exe
          if-no-files-found: error

      - name: 标签时发布 Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
